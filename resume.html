<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="./assets/logo.png">
<link rel="shortcut icon" type="image/png" href="./assets/logo.png">
<link rel="apple-touch-icon" href="./assets/logo-192.png">

<title>Khalid Xaifi - Resume</title>
<meta name="description" content="Printable resume for Khalid Xaifi, Creative Technologist.">

<style>
:root{
  --bg:#f3f2ee;
  --ink:#0b0b0b;
  --orange:#ff4a1c;
  --line:rgba(11,11,11,.16);
  --display:"Anton", Impact, "Arial Black", sans-serif;
  --body:"Rajdhani", Inter, sans-serif;
  --mono:"JetBrains Mono", monospace;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  background:var(--ink);
  color:var(--ink);
  font-family:var(--body);
  font-weight:500;
}
a{ color:inherit; text-decoration:none; }
.page{
  max-width:980px;
  margin:10px auto;
  background:var(--bg);
  border:14px solid var(--ink);
  border-radius:24px;
  padding:clamp(22px,4vw,48px);
}
.topbar{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  margin-bottom:34px;
}
.kicker{
  font-family:var(--mono);
  font-size:.68rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--orange);
}
h1{
  font-family:var(--display);
  font-size:clamp(4rem,11vw,8rem);
  line-height:.86;
  font-weight:400;
  margin-top:10px;
}
.subtitle{
  margin-top:16px;
  font-family:var(--mono);
  font-size:.82rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:rgba(11,11,11,.62);
}
.intro{
  max-width:620px;
  margin-top:24px;
  font-size:1.28rem;
  line-height:1.42;
}
.print-btn{
  border:1.5px solid var(--ink);
  border-radius:6px;
  background:var(--ink);
  color:var(--bg);
  padding:12px 16px;
  font-family:var(--mono);
  font-size:.72rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  white-space:nowrap;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}
.block{
  border-top:1.5px solid var(--ink);
  padding-top:16px;
  break-inside:avoid;
}
.block.wide{ grid-column:1 / -1; }
h2{
  font-family:var(--mono);
  font-size:.72rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--orange);
  margin-bottom:12px;
}
p{
  font-size:1.04rem;
  line-height:1.55;
  color:rgba(11,11,11,.78);
}
ul{
  list-style:none;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px 18px;
}
li{
  position:relative;
  padding-left:14px;
  font-family:var(--mono);
  font-size:.76rem;
  color:rgba(11,11,11,.72);
}
li::before{
  content:'';
  position:absolute;
  left:0;
  top:.55em;
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--orange);
}
.timeline-list{
  display:grid;
  gap:12px;
}
.experience-item{
  display:grid;
  grid-template-columns:90px 1fr;
  gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--line);
}
.experience-item b{
  font-family:var(--mono);
  font-size:.68rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--orange);
}
.experience-item h3{
  font-size:1rem;
  margin-bottom:4px;
}
.experience-item p{
  font-size:.95rem;
  line-height:1.42;
  color:rgba(11,11,11,.72);
}
.contact-row{
  display:grid;
  grid-template-columns:90px 1fr;
  gap:12px;
  padding:8px 0;
  border-bottom:1px solid var(--line);
}
.contact-row b{
  font-family:var(--mono);
  font-size:.66rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(11,11,11,.5);
}
.contact-row span,
.contact-row a{
  font-weight:700;
  overflow-wrap:anywhere;
}
.links{
  margin-top:28px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.links a{
  border:1.5px solid var(--ink);
  border-radius:6px;
  padding:11px 14px;
  font-family:var(--mono);
  font-size:.72rem;
  letter-spacing:.08em;
  text-transform:uppercase;
}
@media(max-width:720px){
  .page{ border-width:8px; border-radius:18px; }
  .topbar{ flex-direction:column; }
  .grid, ul{ grid-template-columns:1fr; }
  .block.wide{ grid-column:auto; }
  .experience-item{ grid-template-columns:1fr; }
}
@media print{
  body{ background:#fff; }
  .page{
    max-width:none;
    margin:0;
    border:0;
    border-radius:0;
    padding:0;
    background:#fff;
  }
  .print-btn,
  .links{ display:none; }
  h1{ font-size:64px; }
  .grid{ gap:14px; }
}
</style>

<body>
  <main class="page">
    <div class="topbar">
      <div>
        <p class="kicker">PRINTABLE RESUME</p>
        <h1 id="heading">RESUME</h1>
        <p class="subtitle" id="subtitle">Khalid Xaifi - Creative Technologist</p>
        <p class="intro" id="intro"></p>
      </div>
      <button class="print-btn" type="button" onclick="window.print()">Print / Save as PDF</button>
    </div>

    <section class="grid">
      <div class="block wide">
        <h2>Profile</h2>
        <p id="profileSummary"></p>
      </div>
      <div class="block">
        <h2>Core Focus</h2>
        <ul id="coreFocus"></ul>
      </div>
      <div class="block">
        <h2>Technical Skills</h2>

        <h2>Creative Skills</h2>
        <ul id="creativeSkills"></ul>
      </div>
      <div class="block">
        <h2>Projects</h2>
        <ul id="featuredProjects"></ul>
      </div>
      <div class="block">

      <div class="block wide">

        <div id="experienceTimeline" class="timeline-list"></div>

    <div class="links">

      <a href="#contact" id="emailLink">Email</a>
      <a href="#contact" id="whatsappLink">WhatsApp</a>
    </div>
  </main>

<script>
const fallback = {
  heading:"RESUME",
  subtitle:"Khalid Xaifi - Creative Technologist",
  intro:"Practical builder focused on AI systems, robotics, automation, interface design, editing, and product-style presentation.",
  profileSummary:"I build practical and visually premium systems across AI, robotics, automation, UI design, editing, and product presentation. My work connects technical thinking with creative execution.",
  coreFocus:["AI Systems","Robotics & Embedded","Web / UI Design","Editing & Visual Design","Product Thinking"],
  technicalSkills:["ESP32","Arduino","Python","JavaScript","HTML / CSS","Embedded Systems","Stepper / Servo Control","Automation Logic","AI Assistant Planning","Product Presentation"],
  creativeSkills:["Graphic Design","Poster Design","Thumbnail Design","Photo Editing","Video Editing","Visual Storytelling","Interface Aesthetics","Brand-style Presentation"],
  featuredProjects:["AXIS Personal AI OS","Wire Cutting Machine"],
  services:["AI Assistant Concept Planning","Robotics / Embedded Prototyping","Website & Portfolio Design","UI / Interface Design","Video / Photo Editing","Posters / Thumbnails / Graphics","Product Presentation","Creative Collaboration"],
  experience:[
    {number:"PHASE 01",title:"Practical Electronics Foundation",description:"Hands-on circuits, sensors, and microcontrollers - learning by building, not just reading."},
    {number:"PHASE 02",title:"Automation & Machine Logic",description:"Designing control logic for real machines - steppers, servos, calibration, and batch workflows."},
    {number:"PHASE 03",title:"UI / Editing / Visual Design",description:"Shaping how systems look and feel with interfaces, edits, and visual storytelling."},
    {number:"PHASE 04",title:"AI Assistant & Robotics Direction",description:"Combining voice, memory, embedded hardware, and product thinking into one coherent system direction."}
  ],
  contact:[
    {label:"Email",value:"xaifikhalid267@gmail.com",link:"mailto:xaifikhalid267@gmail.com"},
    {label:"Phone",value:"+91 8299150971",link:"tel:+918299150971"},
    {label:"WhatsApp",value:"wa.me/918299150971",link:"https://wa.me/918299150971"},
    {label:"Instagram",value:"@khaaaalidddd__",link:"https://www.instagram.com/khaaaalidddd__?utm_source=qr"},
    {label:"Location",value:"Lucknow, India",link:""}
  ]
};

const ANALYTICS_STORAGE_KEY = "portfolio_local_analytics_v1";
initResumeAnalytics();

fetch("./content/site.json", { cache:"no-store" })
  .then((response) => response.ok ? response.json() : Promise.reject())
  .then((data) => render({ ...(data.resume || {}), experience:data.experience || fallback.experience }))
  .catch(() => render(fallback));

function render(resume){
  const data = { ...fallback, ...(resume || {}) };
  setText("heading", data.heading);
  setText("subtitle", data.subtitle);
  setText("intro", data.intro);
  setText("profileSummary", data.profileSummary);
  list("coreFocus", data.coreFocus);
  list("technicalSkills", data.technicalSkills);
  list("creativeSkills", data.creativeSkills);
  list("featuredProjects", data.featuredProjects);
  list("services", data.services);
  renderExperience(data.experience || fallback.experience);
  contact(data.contact);
  const email = (data.contact || []).find((item) => item.label.toLowerCase() === "email");
  const whatsapp = (data.contact || []).find((item) => item.label.toLowerCase() === "whatsapp");
  if (email) document.getElementById("emailLink").href = email.link;
  if (whatsapp) document.getElementById("whatsappLink").href = whatsapp.link;
}

function setText(id, value){
  document.getElementById(id).textContent = value || "";
}

function list(id, items){
  const wrap = document.getElementById(id);
  wrap.innerHTML = "";
  (items || []).forEach((item) => {
    const li = document.createElement("li");
    li.textContent = item;
    wrap.appendChild(li);
  });
}

function renderExperience(items){
  const wrap = document.getElementById("experienceTimeline");
  if (!wrap) return;
  wrap.innerHTML = "";
  (items || []).forEach((item) => {
    const row = document.createElement("div");
    row.className = "experience-item";
    row.innerHTML = `<b>${escapeHTML(item.number)}</b><div><h3>${escapeHTML(item.title)}</h3><p>${escapeHTML(item.description)}</p></div>`;
    wrap.appendChild(row);
  });
}

function contact(items){
  const wrap = document.getElementById("contact");
  wrap.innerHTML = "";
  (items || []).forEach((item) => {
    const row = document.createElement("div");
    row.className = "contact-row";
    const value = item.link ? `<a href="${escapeAttr(item.link)}">${escapeHTML(item.value)}</a>` : `<span>${escapeHTML(item.value)}</span>`;
    row.innerHTML = `<b>${escapeHTML(item.label)}</b>${value}`;
    wrap.appendChild(row);
  });
}

function escapeHTML(value){
  return String(value || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function escapeAttr(value){
  return escapeHTML(value).replace(/`/g,"&#096;");
}

function initResumeAnalytics(){
  const startedAt = Date.now();
  const path = location.pathname || "/resume.html";
  const sessionId = `${startedAt}-${Math.random().toString(16).slice(2)}`;
  const data = readAnalytics();
  data.totalVisits = (data.totalVisits || 0) + 1;
  data.firstVisit = data.firstVisit || new Date(startedAt).toISOString();
  data.lastVisit = new Date(startedAt).toISOString();
  data.pageViews = data.pageViews || {};
  data.pageViews[path] = (data.pageViews[path] || 0) + 1;
  data.devices = data.devices || {};
  const device = window.innerWidth <= 700 ? "Mobile" : window.innerWidth <= 1100 ? "Tablet" : "Desktop";
  data.devices[device] = (data.devices[device] || 0) + 1;
  data.sessions = data.sessions || [];
  data.sessions.unshift({
    id:sessionId,
    path,
    startedAt:new Date(startedAt).toISOString(),
    durationSeconds:0,
    viewport:`${window.innerWidth}x${window.innerHeight}`,
    device
  });
  data.sessions = data.sessions.slice(0, 50);
  saveAnalytics(data);

  document.addEventListener("click", (event) => {
    const link = event.target.closest("a, button");
    if (!link) return;
    const label = (link.textContent || link.getAttribute("aria-label") || link.href || "Unknown").trim().replace(/\s+/g, " ").slice(0, 80);
    const current = readAnalytics();
    current.clicks = current.clicks || {};
    current.clicks[label] = (current.clicks[label] || 0) + 1;
    saveAnalytics(current);
  });

  let sessionClosed = false;
  function closeSession(){
    if (sessionClosed) return;
    sessionClosed = true;
    const current = readAnalytics();
    const session = (current.sessions || []).find((item) => item.id === sessionId);
    if (session) {
      session.durationSeconds = Math.max(1, Math.round((Date.now() - startedAt) / 1000));
      current.lastVisit = new Date().toISOString();
      saveAnalytics(current);
    }
  }
  window.addEventListener("pagehide", closeSession);
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") closeSession();
  });
}

function readAnalytics(){
  try {
    return JSON.parse(localStorage.getItem(ANALYTICS_STORAGE_KEY) || "{}");
  } catch {
    return {};
  }
}

function saveAnalytics(data){
  try {
    localStorage.setItem(ANALYTICS_STORAGE_KEY, JSON.stringify(data));
  } catch {}
}
</script>
</body>
